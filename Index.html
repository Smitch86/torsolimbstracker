<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Lift Log</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@300;400;500;600&display=swap');

:root {
  --bg: #0f0f0f;
  --surface: #1a1a1a;
  --surface2: #242424;
  --border: #2e2e2e;
  --yellow: #FFD600;
  --yellow-dim: #b39800;
  --red: #FF4545;
  --green: #36d67b;
  --blue: #4A90FF;
  --text: #f0f0f0;
  --text-dim: #888;
  --text-muted: #555;
  --radius: 12px;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; background:var(--bg); color:var(--text); font-family:'Barlow',sans-serif; }
body { max-width:480px; margin:0 auto; min-height:100vh; overflow-x:hidden; }

.page { display:none; min-height:100vh; }
.page.active { display:block; }

/* ── USER SELECT ── */
#page-userselect {
  display:none; flex-direction:column; align-items:center; justify-content:center;
  min-height:100vh; padding:40px 24px; text-align:center;
  background: linear-gradient(160deg, #1a1a1a 0%, #0f0f0f 100%);
}
#page-userselect.active { display:flex; }

/* ── WELCOME ── */
#page-welcome {
  display:none; flex-direction:column; align-items:center; justify-content:center;
  min-height:100vh; padding:40px 24px; text-align:center;
  background: linear-gradient(160deg, #1a1a1a 0%, #0f0f0f 100%);
}
#page-welcome.active { display:flex; }

.welcome-title {
  font-family:'Barlow Condensed',sans-serif;
  font-size:72px; font-weight:800; line-height:1;
  color:var(--yellow); letter-spacing:-1px;
  margin-bottom:4px;
}
.welcome-sub {
  font-size:14px; color:var(--text-dim); letter-spacing:0.1em;
  text-transform:uppercase; margin-bottom:32px;
}
.barbell-wrap { width:100%; max-width:320px; margin:0 auto 36px; }
.barbell-svg { width:100%; }

.question {
  font-family:'Barlow Condensed',sans-serif;
  font-size:28px; font-weight:700; color:var(--text);
  margin-bottom:24px; letter-spacing:0.01em;
}

/* User buttons */
.user-btn-row { display:flex; gap:14px; width:100%; margin-bottom:24px; }
.user-btn {
  flex:1; padding:24px 10px;
  background:var(--surface); border:2px solid var(--border);
  border-radius:var(--radius); color:var(--text);
  font-family:'Barlow Condensed',sans-serif;
  font-size:32px; font-weight:800; letter-spacing:0.04em;
  cursor:pointer; text-align:center;
  transition:all 0.15s;
}
.user-btn:active { transform:scale(0.97); }
.user-btn.simon { border-color:#FF6B35; }
.user-btn.simon:active, .user-btn.simon:hover { background:#FF6B3520; }
.user-btn.joe { border-color:var(--blue); }
.user-btn.joe:active, .user-btn.joe:hover { background:#4A90FF20; }
.user-sub { font-family:'Barlow',sans-serif; font-size:11px; font-weight:400; color:var(--text-dim); letter-spacing:0.06em; text-transform:uppercase; display:block; margin-top:4px; }

.workout-btn {
  width:100%; padding:18px 20px;
  background:var(--surface); border:2px solid var(--border);
  border-radius:var(--radius); color:var(--text);
  font-family:'Barlow Condensed',sans-serif;
  font-size:22px; font-weight:700; letter-spacing:0.03em;
  cursor:pointer; text-align:left;
  display:flex; align-items:center; gap:14px;
  transition:all 0.15s; margin-bottom:10px;
}
.workout-btn:active { transform:scale(0.98); }
.workout-btn.torso { border-color:#FF6B35; }
.workout-btn.torso:hover { background:#FF6B3515; }
.workout-btn.limbs { border-color:var(--blue); }
.workout-btn.limbs:hover { background:#4A90FF15; }
.workout-btn.home { border-color:var(--green); }
.workout-btn.home:hover { background:#36d67b15; }
.workout-btn .btn-icon { font-size:28px; }
.workout-btn .btn-text { display:flex; flex-direction:column; }
.workout-btn .btn-label { font-size:22px; line-height:1.1; }
.workout-btn .btn-hint { font-family:'Barlow',sans-serif; font-size:11px; font-weight:400; color:var(--text-dim); letter-spacing:0.05em; text-transform:uppercase; }

.nav-row { display:flex; gap:10px; width:100%; margin-top:16px; }
.nav-small-btn {
  flex:1; padding:12px; background:var(--surface2);
  border:1px solid var(--border); border-radius:var(--radius);
  color:var(--text-dim); font-family:'Barlow',sans-serif;
  font-size:13px; font-weight:500; cursor:pointer;
  display:flex; flex-direction:column; align-items:center; gap:4px;
  transition:all 0.15s;
}
.nav-small-btn:active { transform:scale(0.97); }
.nav-small-btn .ns-icon { font-size:20px; }

/* user pill shown on welcome */
.user-pill {
  display:inline-flex; align-items:center; gap:8px;
  background:var(--surface2); border:1px solid var(--border);
  border-radius:20px; padding:6px 14px; margin-bottom:20px;
  font-size:13px; color:var(--text-dim); cursor:pointer;
}
.user-pill strong { color:var(--yellow); font-family:'Barlow Condensed',sans-serif; font-size:16px; letter-spacing:0.05em; }

/* ── WORKOUT PAGE ── */
#page-workout { padding:0 0 100px; }
.workout-header {
  background:var(--surface);
  border-bottom:1px solid var(--border);
  padding:16px 20px 14px;
  position:sticky; top:0; z-index:50;
}
.wh-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:2px; }
.back-btn {
  background:none; border:none; color:var(--text-dim);
  font-size:13px; cursor:pointer; padding:4px 0;
  display:flex; align-items:center; gap:6px;
}
.workout-type-badge {
  font-family:'Barlow Condensed',sans-serif;
  font-size:18px; font-weight:700;
  padding:4px 12px; border-radius:6px;
}
.badge-torso { background:#FF6B3520; color:#FF6B35; border:1px solid #FF6B3540; }
.badge-limbs { background:#4A90FF20; color:var(--blue); border:1px solid #4A90FF40; }
.badge-home { background:#36d67b20; color:var(--green); border:1px solid #36d67b40; }
.wh-date { font-size:12px; color:var(--text-dim); }
.wh-timer { font-family:'Barlow Condensed',sans-serif; font-size:18px; color:var(--yellow); font-weight:600; }

.exercise-section { padding:16px 16px 8px; }
.section-label { font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:0.12em; color:var(--text-muted); margin-bottom:10px; }

.exercise-row {
  background:var(--surface); border:1px solid var(--border);
  border-radius:10px; margin-bottom:8px; overflow:hidden;
  transition:border-color 0.2s;
}
.exercise-row.has-sets { border-color:var(--yellow-dim); }
.exercise-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 14px; cursor:pointer;
}
.exercise-name { font-family:'Barlow Condensed',sans-serif; font-size:18px; font-weight:600; color:var(--text); flex:1; }
.ex-set-count { font-size:11px; color:var(--yellow); font-weight:600; margin-right:10px; }
.ex-chevron { color:var(--text-muted); font-size:14px; transition:transform 0.2s; }
.exercise-row.open .ex-chevron { transform:rotate(180deg); }

.sets-panel { display:none; padding:0 14px 14px; border-top:1px solid var(--border); }
.exercise-row.open .sets-panel { display:block; }

.set-entry {
  background:var(--surface2); border-radius:8px; padding:12px;
  margin-bottom:8px; border:1px solid var(--border);
}
.set-label { font-family:'Barlow Condensed',sans-serif; font-size:14px; font-weight:700; color:var(--yellow); margin-bottom:10px; }
.set-fields { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:8px; }
.set-fields.bilateral { grid-template-columns:1fr 1fr 1fr; }
.field-group { display:flex; flex-direction:column; gap:4px; }
.field-label { font-size:10px; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.08em; font-weight:600; }
.field-input {
  background:var(--bg); border:1px solid var(--border);
  border-radius:7px; padding:8px 10px;
  color:var(--text); font-family:'Barlow',sans-serif; font-size:15px; font-weight:500;
  outline:none; width:100%; -webkit-appearance:none;
}
.field-input:focus { border-color:var(--yellow); }
.field-input::placeholder { color:var(--text-muted); font-size:13px; }
.field-input.notes { font-size:13px; }
.set-preview { font-size:14px; color:var(--green); margin-top:6px; min-height:16px; font-family:'Barlow Condensed',sans-serif; }
.set-row-actions { display:flex; gap:8px; margin-top:8px; }
.remove-set-btn { background:none; border:1px solid #FF454540; color:var(--red); border-radius:6px; padding:5px 10px; font-size:12px; cursor:pointer; font-family:'Barlow',sans-serif; }
.add-set-btn { width:100%; padding:10px; margin-top:4px; background:none; border:1px dashed var(--border); border-radius:8px; color:var(--text-dim); font-family:'Barlow',sans-serif; font-size:13px; cursor:pointer; transition:all 0.15s; }
.add-set-btn:active { background:var(--surface2); }

.other-input-wrap { padding:12px 0 4px; }
.other-name-input { background:var(--bg); border:1px solid var(--yellow-dim); border-radius:8px; padding:10px 12px; color:var(--text); font-family:'Barlow',sans-serif; font-size:15px; outline:none; width:100%; margin-bottom:10px; }
.other-name-input::placeholder { color:var(--text-muted); }
.confirm-other-btn { padding:8px 18px; background:var(--yellow); color:#000; border:none; border-radius:7px; font-family:'Barlow',sans-serif; font-size:13px; font-weight:700; cursor:pointer; }

.complete-bar { position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:480px; padding:12px 16px 20px; background:linear-gradient(to top, var(--bg) 70%, transparent); z-index:60; }
.complete-workout-btn { width:100%; padding:16px; background:var(--yellow); color:#000; border:none; border-radius:var(--radius); font-family:'Barlow Condensed',sans-serif; font-size:22px; font-weight:800; letter-spacing:0.04em; cursor:pointer; transition:all 0.15s; }
.complete-workout-btn:active { transform:scale(0.98); background:#e6c100; }

/* ── REVIEW ── */
#page-review { padding:20px 16px 100px; }
.review-header { display:flex; align-items:center; gap:12px; margin-bottom:24px; }
.review-title { font-family:'Barlow Condensed',sans-serif; font-size:36px; font-weight:800; color:var(--yellow); }
.review-date { font-size:13px; color:var(--text-dim); margin-top:2px; }
.review-exercise { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:14px; margin-bottom:12px; }
.review-ex-name { font-family:'Barlow Condensed',sans-serif; font-size:20px; font-weight:700; color:var(--text); margin-bottom:10px; border-bottom:1px solid var(--border); padding-bottom:8px; }
.review-set-line { font-family:'Barlow Condensed',sans-serif; font-size:15px; color:var(--green); margin-bottom:4px; line-height:1.4; }
.review-set-line .set-notes { color:var(--text-dim); font-size:13px; }
.export-bar { position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:480px; padding:12px 16px 20px; background:linear-gradient(to top, var(--bg) 70%, transparent); display:flex; gap:10px; z-index:60; }
.export-btn { flex:1; padding:14px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); color:var(--text); font-family:'Barlow',sans-serif; font-size:14px; font-weight:600; cursor:pointer; transition:all 0.15s; }
.export-btn.primary { background:var(--yellow); color:#000; border-color:var(--yellow); }
.export-btn:active { transform:scale(0.97); }

/* ── HISTORY ── */
#page-history { padding:20px 16px 80px; }
.history-title { font-family:'Barlow Condensed',sans-serif; font-size:36px; font-weight:800; color:var(--yellow); margin-bottom:20px; }
.history-session { background:var(--surface); border:1px solid var(--border); border-radius:10px; margin-bottom:12px; overflow:hidden; }
.history-session-header { display:flex; justify-content:space-between; align-items:center; padding:14px 14px; cursor:pointer; }
.hs-date { font-family:'Barlow Condensed',sans-serif; font-size:18px; font-weight:700; }
.hs-type { font-size:12px; color:var(--text-dim); margin-top:2px; }
.hs-count { font-size:12px; color:var(--yellow); }
.history-session-body { display:none; padding:0 14px 14px; border-top:1px solid var(--border); }
.history-session.open .history-session-body { display:block; }
.empty-history { text-align:center; padding:60px 20px; color:var(--text-muted); font-size:15px; }

/* last week highlight */
.last-week-badge { display:inline-block; background:#FFD60020; color:var(--yellow); border:1px solid #FFD60040; border-radius:6px; font-size:10px; font-weight:700; padding:2px 7px; margin-left:8px; letter-spacing:0.06em; text-transform:uppercase; vertical-align:middle; }

.coming-soon { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:60vh; padding:40px 24px; text-align:center; }
.coming-soon h2 { font-family:'Barlow Condensed',sans-serif; font-size:36px; font-weight:800; color:var(--green); margin-bottom:12px; }
.coming-soon p { color:var(--text-dim); font-size:15px; line-height:1.6; }
</style>
</head>
<body>

<!-- ═══════════════ USER SELECT ═══════════════ -->
<div id="page-userselect" class="page active">
  <div class="welcome-title">LIFT LOG</div>
  <div class="welcome-sub">Who's training?</div>
  <div class="barbell-wrap">
    <svg class="barbell-svg" viewBox="0 0 320 80" xmlns="http://www.w3.org/2000/svg">
      <rect x="20" y="28" width="14" height="24" rx="3" fill="#FFD600"/>
      <rect x="34" y="20" width="12" height="40" rx="3" fill="#e0e0e0"/>
      <rect x="46" y="24" width="9" height="32" rx="2" fill="#bdbdbd"/>
      <rect x="55" y="35" width="210" height="10" rx="5" fill="#9e9e9e"/>
      <rect x="265" y="24" width="9" height="32" rx="2" fill="#bdbdbd"/>
      <rect x="274" y="20" width="12" height="40" rx="3" fill="#e0e0e0"/>
      <rect x="286" y="28" width="14" height="24" rx="3" fill="#FFD600"/>
      <line x1="100" y1="36" x2="100" y2="44" stroke="#777" stroke-width="1.5"/>
      <line x1="108" y1="36" x2="108" y2="44" stroke="#777" stroke-width="1.5"/>
      <line x1="116" y1="36" x2="116" y2="44" stroke="#777" stroke-width="1.5"/>
      <line x1="204" y1="36" x2="204" y2="44" stroke="#777" stroke-width="1.5"/>
      <line x1="212" y1="36" x2="212" y2="44" stroke="#777" stroke-width="1.5"/>
      <line x1="220" y1="36" x2="220" y2="44" stroke="#777" stroke-width="1.5"/>
    </svg>
  </div>
  <div class="user-btn-row">
    <button class="user-btn simon" onclick="selectUser('simon')">
      SIMON<span class="user-sub">Tap to log in</span>
    </button>
    <button class="user-btn joe" onclick="selectUser('joe')">
      JOE<span class="user-sub">Tap to log in</span>
    </button>
  </div>
</div>

<!-- ═══════════════ WELCOME ═══════════════ -->
<div id="page-welcome" class="page">
  <div class="welcome-title">LIFT LOG</div>
  <div class="welcome-sub" id="welcome-sub">Training Tracker</div>
  <div id="user-pill-wrap">
    <div class="user-pill" onclick="showPage('userselect')">
      Logged in as <strong id="user-pill-name"></strong> &nbsp;· switch
    </div>
  </div>
  <div class="barbell-wrap">
    <svg class="barbell-svg" viewBox="0 0 320 80" xmlns="http://www.w3.org/2000/svg">
      <rect x="20" y="28" width="14" height="24" rx="3" fill="#FFD600"/>
      <rect x="34" y="20" width="12" height="40" rx="3" fill="#e0e0e0"/>
      <rect x="46" y="24" width="9" height="32" rx="2" fill="#bdbdbd"/>
      <rect x="55" y="35" width="210" height="10" rx="5" fill="#9e9e9e"/>
      <rect x="265" y="24" width="9" height="32" rx="2" fill="#bdbdbd"/>
      <rect x="274" y="20" width="12" height="40" rx="3" fill="#e0e0e0"/>
      <rect x="286" y="28" width="14" height="24" rx="3" fill="#FFD600"/>
      <line x1="100" y1="36" x2="100" y2="44" stroke="#777" stroke-width="1.5"/>
      <line x1="108" y1="36" x2="108" y2="44" stroke="#777" stroke-width="1.5"/>
      <line x1="116" y1="36" x2="116" y2="44" stroke="#777" stroke-width="1.5"/>
      <line x1="204" y1="36" x2="204" y2="44" stroke="#777" stroke-width="1.5"/>
      <line x1="212" y1="36" x2="212" y2="44" stroke="#777" stroke-width="1.5"/>
      <line x1="220" y1="36" x2="220" y2="44" stroke="#777" stroke-width="1.5"/>
    </svg>
  </div>
  <div class="question">What are you training today?</div>
  <button class="workout-btn torso" onclick="startWorkout('torso')">
    <span class="btn-icon">💪</span>
    <span class="btn-text"><span class="btn-label">TORSO</span><span class="btn-hint">Chest · Back · Shoulders</span></span>
  </button>
  <button class="workout-btn limbs" onclick="startWorkout('limbs')">
    <span class="btn-icon">🦵</span>
    <span class="btn-text"><span class="btn-label">LIMBS</span><span class="btn-hint">Quads · Hams · Glutes · Arms</span></span>
  </button>
  <button class="workout-btn home" onclick="startWorkout('home')">
    <span class="btn-icon">🏠</span>
    <span class="btn-text"><span class="btn-label">FULL BODY HOME WORKOUT</span><span class="btn-hint">Bodyweight & bands</span></span>
  </button>
  <div class="nav-row">
    <button class="nav-small-btn" onclick="showPage('history')">
      <span class="ns-icon">📋</span><span>History</span>
    </button>
    <button class="nav-small-btn" onclick="showLastWeek()">
      <span class="ns-icon">📅</span><span>Last Week</span>
    </button>
  </div>
</div>

<!-- ═══════════════ WORKOUT ═══════════════ -->
<div id="page-workout" class="page">
  <div class="workout-header">
    <div class="wh-top">
      <button class="back-btn" onclick="showPage('welcome')">← Back</button>
      <span class="workout-type-badge" id="workout-badge"></span>
      <span class="wh-timer" id="workout-timer">00:00</span>
    </div>
    <div class="wh-date" id="workout-date"></div>
  </div>
  <div class="exercise-section">
    <div class="section-label">Select exercises — tap to log sets</div>
    <div id="exercise-list"></div>
  </div>
  <div class="complete-bar">
    <button class="complete-workout-btn" onclick="completeWorkout()">✓ WORKOUT COMPLETE</button>
  </div>
</div>

<!-- ═══════════════ REVIEW ═══════════════ -->
<div id="page-review" class="page">
  <div class="review-header">
    <div>
      <div class="review-title">SESSION LOGGED</div>
      <div class="review-date" id="review-date"></div>
    </div>
  </div>
  <div id="review-content"></div>
  <div class="export-bar">
    <button class="export-btn" onclick="showPage('welcome')">← Home</button>
    <button class="export-btn" onclick="showPage('history')">📋 History</button>
    <button class="export-btn primary" onclick="exportToCSV()">⬇ Export CSV</button>
  </div>
</div>

<!-- ═══════════════ HISTORY ═══════════════ -->
<div id="page-history" class="page">
  <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;padding:20px 16px 0;">
    <button class="back-btn" onclick="showPage('welcome')" style="font-size:15px;">←</button>
    <div class="history-title" id="history-title">HISTORY</div>
  </div>
  <div style="padding:0 16px 80px;" id="history-content"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// EXERCISES
// ═══════════════════════════════════════════════════════════════
const EXERCISES = {
  torso: [
    "Arsenal Incline Chest Press",
    "Pec Deck",
    "Pec Deck (Single Arm)",
    "Low to High Cable Fly (Single Arm)",
    "Hammer Strength Pullover",
    "Behind The Neck Press (Smith)",
    "Upright Rows (Smith)",
    "Shrugs (Smith)",
    "Lateral Raise Machine",
    "Cable Laterals (Single Arm)",
    "Shoulder Press Machine",
    "Kelso Shrug on T-Bar Row",
    "Kelso Shrug on Row Machine",
    "Row Machine",
    "Iso Row Machine - Elbows up (Single Arm)",
    "Iso Row Machine - Elbows tucked (Single Arm)",
    "Lat Pulldown",
    "Other",
  ],
  limbs: [
    "Barbell Back Squat",
    "Barbell Front Squat",
    "Pendulum Squat",
    "Hack Squat",
    "Leg Press (High feet - glute focus)",
    "Hip Thrust",
    "Leg Extensions",
    "Leg Extensions (Single leg)",
    "Hamstring Curl (seated) (Single leg)",
    "Hamstring Curl (prone)",
    "Smith RDL",
    "Good Mornings",
    "Bulgarian Split Squats (Barbell)",
    "Tricep Extension (machine)",
    "Tricep Pushdown (Single Arm)",
    "Tricep Pushdown",
    "Preacher Curl (plate loaded)",
    "Dumbbell Alternating Curls",
    "Other",
  ],
  home: [],
};

function isBilateral(name) {
  const n = name.toLowerCase();
  return n.includes("single arm") || n.includes("single leg") || n.includes("(single");
}

// ═══════════════════════════════════════════════════════════════
// HISTORICAL DATA — SIMON
// ═══════════════════════════════════════════════════════════════
const SIMON_HISTORY = [
  // ── 1st Feb — Limbs ──
  {
    id: 1706745600000,
    user: 'simon',
    type: 'limbs',
    date: '2025-02-01T10:00:00.000Z',
    duration: 0,

// ═══════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════
let currentUser = null;
let currentWorkout = { type: null, date: null, startTime: null, exercises: {} };
let timerInterval = null;

function storageKey(user) { return `liftlog_v2_${user}`; }

function loadHistory(user) {
  try {
    const saved = JSON.parse(localStorage.getItem(storageKey(user)) || '[]');
    if (user === 'simon') {
      // Merge: saved sessions take priority, seed historical if not already present
      const savedIds = new Set(saved.map(s => s.id));
      const seeded = SIMON_HISTORY.filter(s => !savedIds.has(s.id));
      return [...saved, ...seeded].sort((a, b) => new Date(b.date) - new Date(a.date));
    }
    return saved;
  } catch { return user === 'simon' ? [...SIMON_HISTORY] : []; }
}

function saveHistory(user, history) {
  // Only save non-seeded + new sessions to localStorage
  const toSave = history.filter(s => s.user === user && !SIMON_HISTORY.find(h => h.id === s.id && h.user === 'simon'));
  try { localStorage.setItem(storageKey(user), JSON.stringify(toSave)); } catch {}
}

// ═══════════════════════════════════════════════════════════════
// USER SELECT
// ═══════════════════════════════════════════════════════════════
function selectUser(user) {
  currentUser = user;
  document.getElementById('user-pill-name').textContent = user.toUpperCase();
  document.getElementById('welcome-sub').textContent = user === 'simon' ? "Simon's Log" : "Joe's Log";
  showPage('welcome');
}

// ═══════════════════════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════════════════════
function showPage(id) {
  document.querySelectorAll('.page').forEach(p => {
    p.classList.remove('active');
    p.style.display = '';
  });
  const pg = document.getElementById('page-' + id);
  pg.classList.add('active');
  if (id === 'userselect') pg.style.display = 'flex';
  if (id === 'welcome') pg.style.display = 'flex';
  if (id === 'history') renderHistory();
  window.scrollTo(0, 0);
}

function showLastWeek() {
  renderHistory(true);
  showPage('history');
}

// ═══════════════════════════════════════════════════════════════
// START WORKOUT
// ═══════════════════════════════════════════════════════════════
function startWorkout(type) {
  currentWorkout = { type, date: new Date(), startTime: Date.now(), exercises: {} };
  renderWorkoutPage(type);
  showPage('workout');
  startTimer();
}

function renderWorkoutPage(type) {
  const badge = document.getElementById('workout-badge');
  badge.textContent = type === 'torso' ? 'TORSO' : type === 'limbs' ? 'LIMBS' : 'HOME';
  badge.className = 'workout-type-badge badge-' + type;
  document.getElementById('workout-date').textContent =
    formatDate(currentWorkout.date) + '  ·  ' + (currentUser || '').toUpperCase();
  const list = document.getElementById('exercise-list');
  list.innerHTML = '';
  if (type === 'home') {
    list.innerHTML = `<div class="coming-soon"><h2>HOME WORKOUT</h2><p>Exercise list coming soon.</p></div>`;
    return;
  }
  EXERCISES[type].forEach(name => list.appendChild(buildExerciseRow(name)));
}

// ═══════════════════════════════════════════════════════════════
// EXERCISE ROW
// ═══════════════════════════════════════════════════════════════
function buildExerciseRow(name) {
  const isOther = name === 'Other';
  const bilateral = isBilateral(name);
  const row = document.createElement('div');
  row.className = 'exercise-row';
  row.dataset.name = name;
  const header = document.createElement('div');
  header.className = 'exercise-header';
  header.innerHTML = `
    <span class="exercise-name">${name}</span>
    <span class="ex-set-count" id="setcount-${safeId(name)}"></span>
    <span class="ex-chevron">▾</span>`;
  header.onclick = () => toggleExercise(row, name, bilateral, isOther);
  row.appendChild(header);
  const panel = document.createElement('div');
  panel.className = 'sets-panel';
  panel.id = 'panel-' + safeId(name);
  row.appendChild(panel);
  return row;
}

function toggleExercise(row, name, bilateral, isOther) {
  const isOpen = row.classList.contains('open');
  document.querySelectorAll('.exercise-row.open').forEach(r => r.classList.remove('open'));
  if (!isOpen) { row.classList.add('open'); renderSetsPanel(name, bilateral, isOther); }
}

function renderSetsPanel(name, bilateral, isOther) {
  const panel = document.getElementById('panel-' + safeId(name));
  panel.innerHTML = '';
  if (isOther) {
    const wrap = document.createElement('div');
    wrap.className = 'other-input-wrap';
    const inp = document.createElement('input');
    inp.className = 'other-name-input';
    inp.placeholder = 'Enter exercise name…';
    const btn = document.createElement('button');
    btn.className = 'confirm-other-btn';
    btn.textContent = 'Use this name';
    btn.onclick = () => {
      const n = inp.value.trim();
      if (!n) return;
      if (!currentWorkout.exercises[n]) currentWorkout.exercises[n] = [];
      renderSetsPanel_named(n, isBilateral(n), panel);
    };
    wrap.appendChild(inp); wrap.appendChild(document.createElement('br')); wrap.appendChild(btn);
    panel.appendChild(wrap);
    return;
  }
  if (!currentWorkout.exercises[name]) currentWorkout.exercises[name] = [];
  renderSetsPanel_named(name, bilateral, panel);
}

function renderSetsPanel_named(name, bilateral, panel) {
  panel.innerHTML = '';
  if (!currentWorkout.exercises[name]) currentWorkout.exercises[name] = [];
  const sets = currentWorkout.exercises[name];
  sets.forEach((set, i) => panel.appendChild(buildSetEntry(name, i, bilateral)));
  const addBtn = document.createElement('button');
  addBtn.className = 'add-set-btn';
  addBtn.textContent = `+ Add Set ${sets.length + 1}`;
  addBtn.onclick = () => {
    currentWorkout.exercises[name].push({ weight: '', reps: '', leftReps: '', rightReps: '', rir: '', notes: '' });
    renderSetsPanel_named(name, bilateral, panel);
    updateSetCount(name);
    setTimeout(() => panel.lastElementChild?.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 50);
  };
  panel.appendChild(addBtn);
}

function buildSetEntry(name, index, bilateral) {
  const set = currentWorkout.exercises[name][index];
  const wrap = document.createElement('div');
  wrap.className = 'set-entry';
  wrap.innerHTML = `<div class="set-label">SET ${index + 1}</div>`;
  const fields = document.createElement('div');
  fields.className = bilateral ? 'set-fields bilateral' : 'set-fields';
  if (bilateral) {
    fields.innerHTML = `
      <div class="field-group"><div class="field-label">Weight (kg)</div><input class="field-input" type="number" inputmode="decimal" placeholder="e.g. 80" value="${set.weight}" data-field="weight"></div>
      <div class="field-group"><div class="field-label">Left Reps</div><input class="field-input" type="number" inputmode="numeric" placeholder="reps" value="${set.leftReps}" data-field="leftReps"></div>
      <div class="field-group"><div class="field-label">Right Reps</div><input class="field-input" type="number" inputmode="numeric" placeholder="reps" value="${set.rightReps}" data-field="rightReps"></div>`;
  } else {
    fields.innerHTML = `
      <div class="field-group"><div class="field-label">Weight (kg)</div><input class="field-input" type="number" inputmode="decimal" placeholder="e.g. 80" value="${set.weight}" data-field="weight"></div>
      <div class="field-group"><div class="field-label">Reps</div><input class="field-input" type="number" inputmode="numeric" placeholder="reps" value="${set.reps}" data-field="reps"></div>`;
  }
  const rir = document.createElement('div');
  rir.className = 'set-fields';
  rir.innerHTML = `
    <div class="field-group"><div class="field-label">RIR</div><input class="field-input" type="number" inputmode="numeric" placeholder="0–5" value="${set.rir}" data-field="rir"></div>
    <div class="field-group"><div class="field-label">Notes</div><input class="field-input notes" type="text" placeholder="Optional…" value="${set.notes}" data-field="notes"></div>`;
  wrap.appendChild(fields);
  wrap.appendChild(rir);
  const preview = document.createElement('div');
  preview.className = 'set-preview';
  preview.id = `preview-${safeId(name)}-${index}`;
  wrap.appendChild(preview);
  updatePreview(name, index, bilateral);
  const actions = document.createElement('div');
  actions.className = 'set-row-actions';
  const removeBtn = document.createElement('button');
  removeBtn.className = 'remove-set-btn';
  removeBtn.textContent = 'Remove set';
  removeBtn.onclick = () => {
    currentWorkout.exercises[name].splice(index, 1);
    const panel = document.getElementById('panel-' + safeId(name));
    renderSetsPanel_named(name, bilateral, panel);
    updateSetCount(name);
  };
  actions.appendChild(removeBtn);
  wrap.appendChild(actions);
  wrap.querySelectorAll('.field-input').forEach(inp => {
    inp.addEventListener('input', () => {
      currentWorkout.exercises[name][index][inp.dataset.field] = inp.value;
      updatePreview(name, index, bilateral);
      updateSetCount(name);
    });
  });
  return wrap;
}

function updatePreview(name, index, bilateral) {
  const el = document.getElementById(`preview-${safeId(name)}-${index}`);
  if (!el) return;
  const set = currentWorkout.exercises[name]?.[index];
  if (!set) return;
  let line = `[Set ${index + 1}] [${set.weight || '?'}kg] × `;
  if (bilateral) line += `[Left: ${set.leftReps || '?'} reps] [Right: ${set.rightReps || '?'} reps]`;
  else line += `[${set.reps || '?'} reps]`;
  if (set.rir !== '') line += ` [${set.rir} RIR]`;
  if (set.notes) line += ` [Notes: ${set.notes}]`;
  el.textContent = line;
}

function updateSetCount(name) {
  const el = document.getElementById('setcount-' + safeId(name));
  if (!el) return;
  const sets = currentWorkout.exercises[name];
  if (sets && sets.length > 0) {
    el.textContent = sets.length + ' set' + (sets.length > 1 ? 's' : '');
    el.closest('.exercise-row')?.classList.add('has-sets');
  } else {
    el.textContent = '';
    el.closest('.exercise-row')?.classList.remove('has-sets');
  }
}

// ═══════════════════════════════════════════════════════════════
// COMPLETE
// ═══════════════════════════════════════════════════════════════
function completeWorkout() {
  stopTimer();
  const history = loadHistory(currentUser);
  const session = {
    id: Date.now(),
    user: currentUser,
    type: currentWorkout.type,
    date: currentWorkout.date.toISOString(),
    duration: Math.round((Date.now() - currentWorkout.startTime) / 1000),
    exercises: currentWorkout.exercises,
  };
  history.unshift(session);
  saveHistory(currentUser, history);
  renderReview(session);
  showPage('review');
}

function renderReview(session) {
  document.getElementById('review-date').textContent =
    formatDate(new Date(session.date)) + '  ·  ' + (session.type || '').toUpperCase() + '  ·  ' + formatDuration(session.duration || 0);
  const content = document.getElementById('review-content');
  content.innerHTML = '';
  const entries = Object.entries(session.exercises).filter(([, sets]) => sets.length > 0);
  if (!entries.length) { content.innerHTML = '<p style="color:var(--text-dim);padding:20px 0">No exercises logged.</p>'; return; }
  entries.forEach(([exName, sets]) => {
    const bilateral = isBilateral(exName);
    const block = document.createElement('div');
    block.className = 'review-exercise';
    block.innerHTML = `<div class="review-ex-name">${exName}</div>`;
    sets.forEach((set, i) => {
      let line = `[Set ${i + 1}] [${set.weight || '?'}kg] × `;
      if (bilateral) line += `[Left: ${set.leftReps || '?'} reps] [Right: ${set.rightReps || '?'} reps]`;
      else line += `[${set.reps || '?'} reps]`;
      if (set.rir !== '') line += ` [${set.rir} RIR]`;
      const setLine = document.createElement('div');
      setLine.className = 'review-set-line';
      setLine.textContent = line;
      if (set.notes) { const ns = document.createElement('span'); ns.className = 'set-notes'; ns.textContent = ` — ${set.notes}`; setLine.appendChild(ns); }
      block.appendChild(setLine);
    });
    content.appendChild(block);
  });
}

// ═══════════════════════════════════════════════════════════════
// HISTORY
// ═══════════════════════════════════════════════════════════════
function renderHistory(lastWeekOnly = false) {
  const history = loadHistory(currentUser);
  const titleEl = document.getElementById('history-title');
  const content = document.getElementById('history-content');
  content.innerHTML = '';

  const now = new Date();
  const sevenDaysAgo = new Date(now); sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 7);

  let sessions = history;
  if (lastWeekOnly) {
    sessions = history.filter(s => new Date(s.date) >= sevenDaysAgo);
    titleEl.textContent = 'LAST WEEK';
  } else {
    titleEl.textContent = (currentUser || '').toUpperCase() + ' — HISTORY';
  }

  if (!sessions.length) {
    content.innerHTML = '<div class="empty-history">No sessions in this period.</div>';
    return;
  }

  sessions.forEach(session => {
    const entries = Object.entries(session.exercises || {}).filter(([, s]) => s.length > 0);
    const sessionDate = new Date(session.date);
    const isLastWeek = sessionDate >= sevenDaysAgo;
    const block = document.createElement('div');
    block.className = 'history-session';
    const hdr = document.createElement('div');
    hdr.className = 'history-session-header';
    hdr.innerHTML = `
      <div>
        <div class="hs-date">${formatDate(sessionDate)}${isLastWeek && !lastWeekOnly ? '<span class="last-week-badge">this week</span>' : ''}</div>
        <div class="hs-type">${(session.type || '').toUpperCase()} · ${formatDuration(session.duration || 0)}</div>
      </div>
      <div class="hs-count">${entries.length} exercise${entries.length !== 1 ? 's' : ''} ▾</div>`;
    hdr.onclick = () => block.classList.toggle('open');
    const body = document.createElement('div');
    body.className = 'history-session-body';
    entries.forEach(([exName, sets]) => {
      const bilateral = isBilateral(exName);
      const exDiv = document.createElement('div');
      exDiv.style.cssText = 'margin-bottom:12px;padding-top:10px;';
      exDiv.innerHTML = `<div style="font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;color:var(--text);margin-bottom:4px;">${exName}</div>`;
      sets.forEach((set, i) => {
        let line = `[Set ${i + 1}] [${set.weight || '?'}kg] × `;
        if (bilateral) line += `[L: ${set.leftReps || '?'}] [R: ${set.rightReps || '?'}]`;
        else line += `[${set.reps || '?'} reps]`;
        if (set.rir !== '') line += ` [${set.rir} RIR]`;
        const p = document.createElement('div');
        p.className = 'review-set-line';
        p.textContent = line;
        if (set.notes) { const ns = document.createElement('span'); ns.className = 'set-notes'; ns.textContent = ` — ${set.notes}`; p.appendChild(ns); }
        exDiv.appendChild(p);
      });
      body.appendChild(exDiv);
    });
    block.appendChild(hdr); block.appendChild(body);
    content.appendChild(block);
  });
}

// ═══════════════════════════════════════════════════════════════
// EXPORT CSV
// ═══════════════════════════════════════════════════════════════
function exportToCSV() {
  const history = loadHistory(currentUser);
  let csv = 'User,Date,Type,Duration,Exercise,Set,Weight(kg),Reps,Left Reps,Right Reps,RIR,Notes\n';
  history.forEach(session => {
    const date = formatDate(new Date(session.date));
    const type = (session.type || '').toUpperCase();
    const dur = formatDuration(session.duration || 0);
    const user = (session.user || currentUser || '').toUpperCase();
    Object.entries(session.exercises || {}).forEach(([exName, sets]) => {
      sets.forEach((set, i) => {
        csv += [`"${user}"`,`"${date}"`,`"${type}"`,`"${dur}"`,`"${exName}"`,
          i + 1, set.weight || '', set.reps || '', set.leftReps || '', set.rightReps || '',
          set.rir || '', `"${(set.notes || '').replace(/"/g, '""')}"`
        ].join(',') + '\n';
      });
    });
  });
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `lift-log-${currentUser}-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

// ═══════════════════════════════════════════════════════════════
// TIMER
// ═══════════════════════════════════════════════════════════════
function startTimer() {
  stopTimer();
  const el = document.getElementById('workout-timer');
  timerInterval = setInterval(() => {
    el.textContent = formatDuration(Math.floor((Date.now() - currentWorkout.startTime) / 1000));
  }, 1000);
}
function stopTimer() { if (timerInterval) { clearInterval(timerInterval); timerInterval = null; } }

// ═══════════════════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════════════════
function safeId(name) { return name.replace(/[^a-z0-9]/gi, '_').toLowerCase(); }
function formatDate(d) { return d.toLocaleDateString('en-GB', { weekday:'short', day:'numeric', month:'short', year:'numeric' }); }
function formatDuration(secs) { const m = Math.floor(secs/60), s = secs%60; return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`; }
</script>
